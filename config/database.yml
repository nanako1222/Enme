default: &default
  adapter: mysql2
  encoding: utf8mb4
  collation: utf8mb4_general_ci
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  username: <%= ENV['DB_USERNAME'] %>
  password: <%= ENV['DB_PASSWORD'] %>
  host: <%= ENV['DB_HOST'] %>

development:
  <<: *default
  database: <%= ENV['DB_DATABASE_DEVELOPMENT'] %>

test:
  <<: *default
  database: <%= ENV['DB_DATABASE_TEST'] %>

production:
  <<: *default
  database: <%= ENV['DB_DATABASE'] %>
